<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – CompanyConnect</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="shared.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0e0a2e 0%, #1a1060 50%, #0e0a2e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .box { background: #fff; border-radius: 24px; box-shadow: 0 30px 80px rgba(0,0,0,0.4); width: 100%; max-width: 440px; overflow: hidden; }
    .box-top { background: linear-gradient(135deg, #3b28cc, #7c3aed); padding: 32px 36px 28px; }
    .box-top h2 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .box-top p { color: rgba(255,255,255,0.7); font-size: 13px; }
    .box-body { padding: 32px 36px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="box-top">
      <h2>🔒 Set New Password</h2>
      <p>Your identity has been verified. Enter your new password below.</p>
    </div>
    <div class="box-body">
      <div id="alertBox"></div>
      <div id="formArea">
        <div class="form-group"><label class="form-label">New Password</label><input type="password" id="newPass" class="form-control" placeholder="Enter new password (min 6 chars)"/></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" id="confirmPass" class="form-control" placeholder="Repeat new password"/></div>
        <button class="btn btn-primary btn-full btn-lg" id="resetBtn" onclick="doReset()" style="margin-top:8px;">Update Password →</button>
      </div>
    </div>
  </div>

  <script>
    // Get oobCode from URL (Firebase appends this after email link click)
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');

    if (!oobCode) {
      document.getElementById('formArea').innerHTML = '<p style="color:#ef4444;font-size:14px;">❌ Invalid or expired link. Please request a new password reset from Settings.</p><a href="login.html" class="btn btn-primary btn-full" style="margin-top:16px;display:block;text-align:center;">Back to Login</a>';
    } else {
      // Verify the oobCode is valid before showing the form
      firebase.auth().verifyPasswordResetCode(oobCode)
        .catch(() => {
          document.getElementById('formArea').innerHTML = '<p style="color:#ef4444;font-size:14px;">❌ This link has expired or already been used. Please request a new one from Settings.</p><a href="login.html" class="btn btn-primary btn-full" style="margin-top:16px;display:block;text-align:center;">Back to Login</a>';
        });
    }

    async function doReset() {
      const newPass = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;
      if (!newPass || !confirmPass) return showAlert('alertBox', 'Please fill both fields.', 'error');
      if (newPass.length < 6) return showAlert('alertBox', 'Password must be at least 6 characters.', 'error');
      if (newPass !== confirmPass) return showAlert('alertBox', 'Passwords do not match.', 'error');

      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = 'Updating...';
      try {
        await firebase.auth().confirmPasswordReset(oobCode, newPass);
        showAlert('alertBox', '✅ Password updated successfully! Redirecting to login...', 'success');
        document.getElementById('newPass').value = '';
        document.getElementById('confirmPass').value = '';
        setTimeout(() => window.location.href = 'login.html', 2500);
      } catch (e) {
        if (e.code === 'auth/expired-action-code') {
          showAlert('alertBox', 'This link has expired. Please request a new one from Settings.', 'error');
        } else if (e.code === 'auth/invalid-action-code') {
          showAlert('alertBox', 'Invalid link. Please request a new one from Settings.', 'error');
        } else {
          showAlert('alertBox', e.message, 'error');
        }
        btn.disabled = false; btn.textContent = 'Update Password →';
      }
    }
  </script>
</body>
</html>
