<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – InfyTrack</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0e0a2e 0%, #1a1060 50%, #0e0a2e 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-box { background: #fff; border-radius: 24px; box-shadow: 0 30px 80px rgba(0,0,0,0.4); width: 100%; max-width: 560px; overflow: hidden; }
    .auth-top { background: linear-gradient(135deg, #3b28cc, #7c3aed); padding: 28px 36px 24px; }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .auth-logo-hex { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .auth-logo-name { font-family: var(--font-head); font-size: 18px; font-weight: 800; color: #fff; }
    .auth-logo-sub { font-size: 11px; color: rgba(255,255,255,0.6); font-family: var(--font-mono); }
    .auth-top h2 { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: #fff; }
    .auth-top p { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 4px; }
    .auth-body { padding: 28px 36px; }

    /* Portal tabs (Student / Faculty / Admin) */
    .portal-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
    .portal-tab { flex: 1; padding: 9px 6px; text-align: center; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text3); transition: all 0.2s; font-family: var(--font-body); }
    .portal-tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    /* Sub tabs (Login / Register) */
    .auth-tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
    .auth-tab { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text3); transition: all 0.2s; font-family: var(--font-body); }
    .auth-tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .auth-footer { text-align: center; padding: 0 36px 24px; font-size: 13px; color: var(--text3); }
    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }

    /* CAPTCHA */
    .captcha-wrap { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .captcha-canvas { border-radius:8px; border:1.5px solid var(--border2); cursor:pointer; flex-shrink:0; }
    .captcha-input { flex:1; }
    .captcha-hint { font-size:11px; color:var(--text3); margin-top:4px; font-family:var(--font-mono); }

    /* PASSWORD TOGGLE */
    .pass-wrap { position:relative; }
    .pass-wrap .form-control { padding-right: 40px; }
    .pass-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text3); background:none; border:none; padding:0; display:flex; align-items:center; }
    .pass-eye:hover { color:var(--text2); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-top">
        <div class="auth-logo">
          <img src="bee2.jpeg" alt="StudentsConnect Logo" style="width: 40px; height: 40px; border-radius: 10px; object-fit: cover;">
          <div><div class="auth-logo-name">InfyTrack</div><div class="auth-logo-sub">Academic Activity Dashboard</div></div>
        </div>
        <h2 id="portalTitle">Student Portal</h2>
        <p>St. Joseph's College of Engineering</p>
      </div>
      <div class="auth-body">
        <div id="alertBox"></div>

        <!-- Portal Selector -->
        <div class="portal-tabs">
          <button class="portal-tab active" onclick="switchPortal('student')">👤 Student</button>
          <button class="portal-tab" onclick="switchPortal('faculty')">🎓 Faculty</button>
          <button class="portal-tab" onclick="switchPortal('admin')">🛡️ Admin</button>
        </div>

        <!-- ═══ STUDENT PORTAL ═══ -->
        <div id="portalStudent">
          <div class="auth-tabs">
            <button class="auth-tab active" id="sTabLogin" onclick="switchTab('student','login')">Login</button>
            <button class="auth-tab" id="sTabRegister" onclick="switchTab('student','register')">Register</button>
          </div>
          <!-- Student Login -->
          <div id="sLoginPanel">
            <div class="form-group"><label class="form-label">College Email <span class="req">*</span></label><input type="email" id="sLoginEmail" class="form-control" placeholder="yourname@stjosephs.ac.in"/></div>
            <div class="form-group"><label class="form-label">Password <span class="req">*</span></label><div class="pass-wrap"><input type="password" id="sLoginPass" class="form-control" placeholder="Enter password"/><button class="pass-eye" type="button" onclick="togglePass('sLoginPass',this)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
            <div class="form-group">
              <label class="form-label">CAPTCHA Verification <span class="req">*</span></label>
              <div class="captcha-wrap">
                <canvas id="sCaptchaCanvas" class="captcha-canvas" width="160" height="48" title="Click to refresh"></canvas>
                <input type="text" id="sCaptchaInput" class="form-control captcha-input" placeholder="Enter code above" maxlength="6" autocomplete="off"/>
              </div>
              <div class="captcha-hint">🔄 Click the image to refresh</div>
            </div>
            <button class="btn btn-primary btn-full btn-lg" id="sLoginBtn" onclick="doStudentLogin()">Login →</button>
          </div>
          <!-- Student Register -->
          <div id="sRegisterPanel" style="display:none;">
            <div class="form-row">
              <div class="form-group"><label class="form-label">Full Name (CAPS) <span class="req">*</span></label><input type="text" id="srName" class="form-control" placeholder="FIRSTNAME LASTNAME" style="text-transform:uppercase;"/></div>
              <div class="form-group"><label class="form-label">Register Number <span class="req">*</span></label><input type="text" id="srReg" class="form-control" placeholder="312323205041"/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">College Email <span class="req">*</span></label><input type="email" id="srEmail" class="form-control" placeholder="yourname@stjosephs.ac.in"/></div>
              <div class="form-group"><label class="form-label">Phone <span class="req">*</span></label><input type="tel" id="srPhone" class="form-control" placeholder="9876543210"/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Department <span class="req">*</span></label>
                <select id="srDept" class="form-control"><option value="">Select</option><option>CSE</option><option>IT</option><option>AML</option><option>ADS</option><option>ECE</option><option>EEE</option><option>EIE</option><option>Bio</option><option>Chem</option><option>Mech</option></select>
              </div>
              <div class="form-group"><label class="form-label">Batch <span class="req">*</span></label>
                <select id="srYear" class="form-control"><option>2022-26</option><option>2023-27</option><option>2024-28</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Section</label><input type="text" id="srSection" class="form-control" placeholder="A / B"/></div>
              <div class="form-group"><label class="form-label">Gender</label><select id="srGender" class="form-control"><option>Male</option><option>Female</option></select></div>
            </div>
            <div class="form-group"><label class="form-label">College <span class="req">*</span></label>
              <select id="srCollege" class="form-control"><option>St. Joseph's College of Engineering</option><option>St. Joseph's Institute of Technology</option></select>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Password <span class="req">*</span></label><input type="password" id="srPass" class="form-control" placeholder="Create password"/></div>
              <div class="form-group"><label class="form-label">Confirm Password <span class="req">*</span></label><input type="password" id="srPass2" class="form-control" placeholder="Repeat password"/></div>
            </div>
            <button class="btn btn-primary btn-full btn-lg" id="sRegBtn" onclick="doStudentRegister()">Create Account →</button>
          </div>
        </div>

        <!-- ═══ FACULTY PORTAL ═══ -->
        <div id="portalFaculty" style="display:none;">
          <div class="auth-tabs">
            <button class="auth-tab active" id="fTabLogin" onclick="switchTab('faculty','login')">Login</button>
            <button class="auth-tab" id="fTabRegister" onclick="switchTab('faculty','register')">Register</button>
          </div>
          <!-- Faculty Login -->
          <div id="fLoginPanel">
            <div class="form-group"><label class="form-label">Faculty Email <span class="req">*</span></label><input type="email" id="fLoginEmail" class="form-control" placeholder="faculty@stjosephs.ac.in"/></div>
            <div class="form-group"><label class="form-label">Password <span class="req">*</span></label><div class="pass-wrap"><input type="password" id="fLoginPass" class="form-control" placeholder="Enter password"/><button class="pass-eye" type="button" onclick="togglePass('fLoginPass',this)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
            <div class="form-group">
              <label class="form-label">CAPTCHA Verification <span class="req">*</span></label>
              <div class="captcha-wrap">
                <canvas id="fCaptchaCanvas" class="captcha-canvas" width="160" height="48" title="Click to refresh"></canvas>
                <input type="text" id="fCaptchaInput" class="form-control captcha-input" placeholder="Enter code above" maxlength="6" autocomplete="off"/>
              </div>
              <div class="captcha-hint">🔄 Click the image to refresh</div>
            </div>
            <button class="btn btn-primary btn-full btn-lg" id="fLoginBtn" onclick="doFacultyLogin()" style="background:#10b981;">Login as Faculty →</button>
          </div>
          <!-- Faculty Register -->
          <div id="fRegisterPanel" style="display:none;">
            <div class="form-row">
              <div class="form-group"><label class="form-label">Full Name <span class="req">*</span></label><input type="text" id="frName" class="form-control" placeholder="Dr. FIRSTNAME LASTNAME"/></div>
              <div class="form-group"><label class="form-label">Employee ID <span class="req">*</span></label><input type="text" id="frEmpId" class="form-control" placeholder="FAC2024001"/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Faculty Email <span class="req">*</span></label><input type="email" id="frEmail" class="form-control" placeholder="faculty@stjosephs.ac.in"/></div>
              <div class="form-group"><label class="form-label">Phone <span class="req">*</span></label><input type="tel" id="frPhone" class="form-control" placeholder="9876543210"/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Department <span class="req">*</span></label>
                <select id="frDept" class="form-control"><option value="">Select</option><option>CSE</option><option>IT</option><option>AML</option><option>ADS</option><option>ECE</option><option>EEE</option><option>EIE</option><option>Bio</option><option>Chem</option><option>Mech</option></select>
              </div>
              <div class="form-group"><label class="form-label">Designation <span class="req">*</span></label><input type="text" id="frDesignation" class="form-control" placeholder="Assistant Professor"/></div>
            </div>
            <div class="form-group"><label class="form-label">College <span class="req">*</span></label>
              <select id="frCollege" class="form-control"><option>St. Joseph's College of Engineering</option><option>St. Joseph's Institute of Technology</option></select>
            </div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Password <span class="req">*</span></label><input type="password" id="frPass" class="form-control" placeholder="Create password"/></div>
              <div class="form-group"><label class="form-label">Confirm Password <span class="req">*</span></label><input type="password" id="frPass2" class="form-control" placeholder="Repeat password"/></div>
            </div>
            <button class="btn btn-full btn-lg" id="fRegBtn" onclick="doFacultyRegister()" style="background:#10b981;color:#fff;">Create Faculty Account →</button>
          </div>
        </div>

        <!-- ═══ ADMIN PORTAL ═══ -->
        <div id="portalAdmin" style="display:none;">
          <div class="form-group"><label class="form-label">Admin Email <span class="req">*</span></label><input type="email" id="aLoginEmail" class="form-control" placeholder="admin@stjosephs.ac.in"/></div>
          <div class="form-group"><label class="form-label">Password <span class="req">*</span></label><div class="pass-wrap"><input type="password" id="aLoginPass" class="form-control" placeholder="Enter password"/><button class="pass-eye" type="button" onclick="togglePass('aLoginPass',this)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
          <div class="form-group">
            <label class="form-label">CAPTCHA Verification <span class="req">*</span></label>
            <div class="captcha-wrap">
              <canvas id="aCaptchaCanvas" class="captcha-canvas" width="160" height="48" title="Click to refresh"></canvas>
              <input type="text" id="aCaptchaInput" class="form-control captcha-input" placeholder="Enter code above" maxlength="6" autocomplete="off"/>
            </div>
            <div class="captcha-hint">🔄 Click the image to refresh</div>
          </div>
          <button class="btn btn-full btn-lg" id="aLoginBtn" onclick="doAdminLogin()" style="background:#1e1060;color:#fff;">Login as Admin →</button>
        </div>

      </div>
      <div class="auth-footer"><a href="index.html">← Back to Home</a></div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.innerHTML = show
        ? '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    // ── CAPTCHA ENGINE ──────────────────────────────────
    const captchas = {};
    const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function drawCaptcha(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      let code = '';
      for (let i = 0; i < 6; i++) code += CHARS[Math.floor(Math.random() * CHARS.length)];
      captchas[canvasId] = code;
      ctx.fillStyle = '#f0f2f8'; ctx.fillRect(0, 0, w, h);
      for (let i = 0; i < 40; i++) {
        ctx.fillStyle = `rgba(${rand(80,180)},${rand(80,180)},${rand(80,180)},0.5)`;
        ctx.beginPath(); ctx.arc(rand(0,w), rand(0,h), rand(1,3), 0, Math.PI*2); ctx.fill();
      }
      for (let i = 0; i < 4; i++) {
        ctx.strokeStyle = `rgba(${rand(100,200)},${rand(100,200)},${rand(100,200)},0.4)`;
        ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(rand(0,w), rand(0,h)); ctx.lineTo(rand(0,w), rand(0,h)); ctx.stroke();
      }
      const colors = ['#3b28cc','#7c3aed','#1d4ed8','#065f46','#92400e','#991b1b'];
      for (let i = 0; i < code.length; i++) {
        ctx.save();
        ctx.font = `bold ${rand(22,28)}px Arial`;
        ctx.fillStyle = colors[i % colors.length];
        ctx.translate(14 + i * 24, h/2 + rand(-4,4));
        ctx.rotate(rand(-15,15) * Math.PI / 180);
        ctx.fillText(code[i], 0, 8);
        ctx.restore();
      }
      canvas.onclick = () => { drawCaptcha(canvasId); document.getElementById(canvasId.replace('Canvas','Input')).value = ''; };
    }

    function checkCaptcha(canvasId) {
      const entered = document.getElementById(canvasId.replace('Canvas','Input')).value.trim();
      if (entered !== captchas[canvasId]) {
        showAlert('alertBox', '❌ Incorrect CAPTCHA. Please try again.', 'error');
        drawCaptcha(canvasId);
        document.getElementById(canvasId.replace('Canvas','Input')).value = '';
        return false;
      }
      return true;
    }

    window.addEventListener('load', () => {
      drawCaptcha('sCaptchaCanvas');
      drawCaptcha('fCaptchaCanvas');
      drawCaptcha('aCaptchaCanvas');
    });

    function switchPortal(portal) {
      ['student','faculty','admin'].forEach(p => {
        document.getElementById('portal' + p.charAt(0).toUpperCase() + p.slice(1)).style.display = p === portal ? '' : 'none';
      });
      document.querySelectorAll('.portal-tab').forEach((t, i) => {
        t.classList.toggle('active', ['student','faculty','admin'][i] === portal);
      });
      const titles = { student: 'Student Portal', faculty: 'Faculty Portal', admin: 'Admin Portal' };
      document.getElementById('portalTitle').textContent = titles[portal];
      const map = { student:'sCaptchaCanvas', faculty:'fCaptchaCanvas', admin:'aCaptchaCanvas' };
      drawCaptcha(map[portal]);
      document.getElementById(map[portal].replace('Canvas','Input')).value = '';
    }

    function switchTab(portal, tab) {
      const prefix = portal === 'student' ? 's' : 'f';
      document.getElementById(prefix + 'TabLogin').classList.toggle('active', tab === 'login');
      document.getElementById(prefix + 'TabRegister').classList.toggle('active', tab === 'register');
      document.getElementById(prefix + 'LoginPanel').style.display = tab === 'login' ? '' : 'none';
      document.getElementById(prefix + 'RegisterPanel').style.display = tab === 'register' ? '' : 'none';
    }

    // ── Student Login ──────────────────────────────────
    async function doStudentLogin() {
      const email = document.getElementById('sLoginEmail').value.trim();
      const pass  = document.getElementById('sLoginPass').value;
      if (!email || !pass) return showAlert('alertBox', 'Please fill all fields.', 'error');
      if (!checkCaptcha('sCaptchaCanvas')) return;
      const btn = document.getElementById('sLoginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
        const idToken = await cred.user.getIdToken();
        const data = await apiCall('POST', '/auth/login/student', { idToken });
        Auth.setToken(data.token); Auth.setUser(data.student);
        showAlert('alertBox', 'Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) { showAlert('alertBox', err.message, 'error'); btn.disabled = false; btn.textContent = 'Login →'; drawCaptcha('sCaptchaCanvas'); document.getElementById('sCaptchaInput').value=''; }
    }

    // ── Student Register ───────────────────────────────
    async function doStudentRegister() {
      const name = document.getElementById('srName').value.trim().toUpperCase();
      const reg   = document.getElementById('srReg').value.trim();
      const email = document.getElementById('srEmail').value.trim();
      const phone = document.getElementById('srPhone').value.trim();
      const dept  = document.getElementById('srDept').value;
      const year  = document.getElementById('srYear').value;
      const section = document.getElementById('srSection').value.trim();
      const gender  = document.getElementById('srGender').value;
      const college = document.getElementById('srCollege').value;
      const pass  = document.getElementById('srPass').value;
      const pass2 = document.getElementById('srPass2').value;
      if (!name || !reg || !email || !phone || !dept || !pass) return showAlert('alertBox', 'Please fill all required fields.', 'error');
      if (pass !== pass2) return showAlert('alertBox', 'Passwords do not match.', 'error');
      if (pass.length < 6) return showAlert('alertBox', 'Password must be at least 6 characters.', 'error');
      const btn = document.getElementById('sRegBtn');
      btn.disabled = true; btn.textContent = 'Registering...';
      try {
        await apiCall('POST', '/auth/register/student', { email, password: pass, name, registerNumber: reg, department: dept, year, section, phone, college, gender });
        showAlert('alertBox', '✅ Registration request sent! Please wait for admin approval.', 'success');
        setTimeout(() => switchTab('student', 'login'), 3000);
      } catch (err) { showAlert('alertBox', err.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Create Account →'; }
    }

    // ── Faculty Login ──────────────────────────────────
    async function doFacultyLogin() {
      const email = document.getElementById('fLoginEmail').value.trim();
      const pass  = document.getElementById('fLoginPass').value;
      if (!email || !pass) return showAlert('alertBox', 'Please fill all fields.', 'error');
      if (!checkCaptcha('fCaptchaCanvas')) return;
      const btn = document.getElementById('fLoginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
        const idToken = await cred.user.getIdToken();
        const data = await apiCall('POST', '/auth/login/faculty', { idToken });
        Auth.setToken(data.token); Auth.setFaculty(data.faculty);
        showAlert('alertBox', 'Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'faculty-dashboard.html', 1000);
      } catch (err) { showAlert('alertBox', err.message, 'error'); btn.disabled = false; btn.textContent = 'Login as Faculty →'; drawCaptcha('fCaptchaCanvas'); document.getElementById('fCaptchaInput').value=''; }
    }

    // ── Faculty Register ───────────────────────────────
    async function doFacultyRegister() {
      const name        = document.getElementById('frName').value.trim();
      const empId       = document.getElementById('frEmpId').value.trim();
      const email       = document.getElementById('frEmail').value.trim();
      const phone       = document.getElementById('frPhone').value.trim();
      const dept        = document.getElementById('frDept').value;
      const designation = document.getElementById('frDesignation').value.trim();
      const college     = document.getElementById('frCollege').value;
      const pass        = document.getElementById('frPass').value;
      const pass2       = document.getElementById('frPass2').value;
      if (!name || !empId || !email || !phone || !dept || !designation || !pass) return showAlert('alertBox', 'Please fill all required fields.', 'error');
      if (pass !== pass2) return showAlert('alertBox', 'Passwords do not match.', 'error');
      if (pass.length < 6) return showAlert('alertBox', 'Password must be at least 6 characters.', 'error');
      const btn = document.getElementById('fRegBtn');
      btn.disabled = true; btn.textContent = 'Registering...';
      try {
        await apiCall('POST', '/auth/register/faculty', { email, password: pass, name, employeeId: empId, department: dept, designation, phone, college });
        showAlert('alertBox', '✅ Faculty registration request sent! Please wait for admin approval.', 'success');
        setTimeout(() => switchTab('faculty', 'login'), 3000);
      } catch (err) { showAlert('alertBox', err.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Create Faculty Account →'; }
    }

    // ── Admin Login ────────────────────────────────────
    async function doAdminLogin() {
      const email = document.getElementById('aLoginEmail').value.trim();
      const pass  = document.getElementById('aLoginPass').value;
      if (!email || !pass) return showAlert('alertBox', 'Please fill all fields.', 'error');
      if (!checkCaptcha('aCaptchaCanvas')) return;
      const btn = document.getElementById('aLoginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
        const idToken = await cred.user.getIdToken();
        const data = await apiCall('POST', '/auth/login/admin', { idToken });
        Auth.setToken(data.token); Auth.setAdmin(data.admin);
        showAlert('alertBox', 'Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
      } catch (err) { showAlert('alertBox', err.message, 'error'); btn.disabled = false; btn.textContent = 'Login as Admin →'; drawCaptcha('aCaptchaCanvas'); document.getElementById('aCaptchaInput').value=''; }
    }
  </script>
</body>
</html>
