<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – CompanyConnect</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .filter-btn { padding: 7px 16px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" style="text-decoration:none;">
      <img src="logo.png" alt="StudentsConnect Logo" style="width: 36px; height: 36px; border-radius: 8px; object-fit: cover; margin-right: 8px;">
      <div><div class="brand-name">CompanyConnect</div><div class="brand-sub">Admin Panel</div></div>
    </a>
    <div class="nav-links"><span id="navAdmin" style="color:rgba(255,255,255,0.7);font-size:13px;"></span><a href="admin-login.html" onclick="doLogout('admin-login.html')" class="btn-nav">Logout</a></div>
  </nav>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Admin Menu</div><div id="sidebarLinks"></div></div></aside>
    <main class="main-content">
      <div class="page-header anim" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
        <div>
          <h1 style="margin: 0; font-size: 24px;">Admin Dashboard</h1>
          <p style="margin: 4px 0 0 0; color: var(--text3); font-size: 14px;">Overview of all activities and analytics</p>
        </div>
        <div style="display: flex; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 99px; border: 1px solid rgba(255,255,255,0.05);">
          <button class="filter-btn" id="collegeEngineering" onclick="setFilter('college','engineering')" style="border:none; background:transparent; border-radius: 99px;">Engineering</button>
          <button class="filter-btn" id="collegeTechnology" onclick="setFilter('college','technology')" style="border:none; background:transparent; border-radius: 99px;">Technology</button>
          <button class="filter-btn active" id="collegeAll" onclick="setFilter('college','all')" style="border:none; border-radius: 99px;">All</button>
        </div>
      </div>

      <!-- Role Filter -->
      <div class="card anim anim-1" style="display: flex; justify-content: center; padding: 16px; margin-bottom: 32px; border-radius: 16px; background: var(--surface);">
        <div style="display: flex; gap: 8px;">
          <button class="filter-btn active" id="roleStudents" onclick="setFilter('role','students')" style="padding: 10px 40px; font-size: 14px; border:none; border-radius: 99px; background: #8b5cf6; color: #fff;">👥 Students</button>
          <button class="filter-btn" id="roleFaculty" onclick="setFilter('role','faculty')" style="padding: 10px 40px; font-size: 14px; border:none; border-radius: 99px; background: transparent; color: var(--text2);">🎓 Faculty</button>
        </div>
      </div>

      <!-- Stats rows -->
      <div class="stats-row anim anim-2" id="statsRow" style="grid-template-columns:repeat(4,1fr);"><p class="text-muted">Loading...</p></div>
      <div class="anim anim-3" id="statsRow2" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;"></div>

      <!-- Live Bar Chart -->
      <div class="card anim anim-4" style="margin-bottom:24px;">
        <div class="card-header">
          <div class="card-title">Completed Programs by Department</div>
          <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:#22c55e;font-weight:600;">
            <span style="width:8px;height:8px;background:#22c55e;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite;"></span>LIVE
          </span>
        </div>
        <canvas id="adminBarChart" height="80"></canvas>
      </div>

      <!-- Completion Rate -->
      <div class="card anim anim-4" style="margin-bottom:24px; padding: 24px; background: var(--surface);">
        <div style="font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 32px; font-family: var(--font-head);">Program Completion Rate</div>
        <div id="completionRates" style="display:flex; flex-direction:column; gap:28px;"></div>
      </div>

    </main>
  </div>

  <script src="shared.js"></script>
  <script>
    const admin = requireAdmin();
    let activeRole = 'students', activeCollege = 'all';
    let chartInstance = null;

    const COLLEGE_MAP = {
      engineering: "St. Joseph's College of Engineering",
      technology:  "St. Joseph's Institute of Technology",
    };

    if (admin) {
      document.getElementById('navAdmin').textContent = admin.name;
      document.getElementById('sidebarLinks').innerHTML = buildAdminNav('admin-dashboard.html');
      initChart();
      loadAll();
      setInterval(loadAll, 15000);
    }

    function initChart() {
      chartInstance = new Chart(document.getElementById('adminBarChart'), {
        type: 'bar',
        data: { labels: [], datasets: [] },
        options: {
          responsive: true,
          animation: { duration: 700, easing: 'easeInOutQuart' },
          plugins: {
            legend: { labels: { color: '#475569', font: { size: 12 } } },
            tooltip: {
              callbacks: {
                title: ctx => `Department: ${ctx[0].label}`,
                label: ctx => {
                  const ds = ctx.dataset;
                  const i  = ctx.dataIndex;
                  const enrolled  = ds._enrolled?.[i] ?? 0;
                  const completed = ctx.parsed.y;
                  return [`  Enrolled:  ${enrolled}`, `  Completed: ${completed}`];
                }
              }
            }
          },
          scales: {
            x: { ticks: { color: '#475569' }, grid: { color: 'rgba(0,0,0,0.06)' } },
            y: { ticks: { color: '#475569', stepSize: 1, precision: 0 }, grid: { color: 'rgba(0,0,0,0.06)' }, beginAtZero: true,
              title: { display: true, text: 'Completed Programs', color: '#94a3b8', font: { size: 11 } } }
          }
        }
      });
    }

    function setFilter(type, value) {
      if (type === 'role') {
        activeRole = value;
        ['Students','Faculty'].forEach(v => {
          const btn = document.getElementById('role' + v);
          if (value === v.toLowerCase()) {
            btn.style.background = '#8b5cf6';
            btn.style.color = '#fff';
            btn.classList.add('active');
          } else {
            btn.style.background = 'transparent';
            btn.style.color = 'var(--text2)';
            btn.classList.remove('active');
          }
        });
      } else {
        activeCollege = value;
        ['All','Engineering','Technology'].forEach(v => {
          const btn = document.getElementById('college' + v);
          if (value === v.toLowerCase()) {
            btn.style.background = '#3b82f6';
            btn.style.color = '#fff';
            btn.classList.add('active');
          } else {
            btn.style.background = 'transparent';
            btn.style.color = 'var(--text2)';
            btn.classList.remove('active');
          }
        });
      }
      loadAll();
    }



    async function loadAll() {
      await Promise.all([loadStats(), loadChartData(), loadCompletionRates()]);
    }

    async function loadStats() {
      try {
        const params = new URLSearchParams();
        if (activeRole    !== 'all') params.set('role',    activeRole);
        if (activeCollege !== 'all') params.set('college', activeCollege);
        const stats = await apiCall('GET', `/admin/dashboard?${params.toString()}`);
        const roleLabel = activeRole === 'students' ? 'Students' : activeRole === 'faculty' ? 'Faculty' : 'Members';
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">Total ${roleLabel}</div><div class="stat-value">${stats.totalMembers}</div><div class="stat-delta">Approved</div></div>
          <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-label">Pending Approvals</div><div class="stat-value">${stats.pendingApprovals}</div><div class="stat-delta"><a href="admin-pending.html">Review →</a></div></div>
          <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-label">Enrolled</div><div class="stat-value">${stats.enrolled}</div><div class="stat-delta">Across all programs</div></div>
          <div class="stat-card"><div class="stat-icon">🏅</div><div class="stat-label">Completed</div><div class="stat-value">${stats.completed}</div><div class="stat-delta">Programs finished</div></div>`;
        document.getElementById('statsRow2').innerHTML = `
          <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">Verified Docs</div><div class="stat-value">${stats.verifiedDocs}</div><div class="stat-delta">Admin verified</div></div>
          <div class="stat-card"><div class="stat-icon">🔍</div><div class="stat-label">Pending Docs</div><div class="stat-value">${stats.pendingDocs}</div><div class="stat-delta">Under review</div></div>
          <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-label">Rejected Docs</div><div class="stat-value">${stats.rejectedDocs}</div><div class="stat-delta">Needs re-upload</div></div>
          <div></div>`;
      } catch (err) {
        document.getElementById('statsRow').innerHTML = `<p class="text-muted">${err.message}</p>`;
      }
    }

    async function loadDepartmentData() {
      try {
        const collegeFilter = activeCollege !== 'all' ? COLLEGE_MAP[activeCollege] : null;

        const [studParts, facParts, studSnap, facSnap] = await Promise.all([
          apiCall('GET', '/admin/all-participation'),
          apiCall('GET', '/admin/faculty-participation'),
          apiCall('GET', '/admin/students'),
          apiCall('GET', '/admin/faculty/all'),
        ]);

        const depts = ['CSE','IT','AML','ADS','ECE','EEE','EIE','Mech','Bio','Chem'];

        const studMap = {};
        studSnap.forEach(s => { studMap[s.uid||s.id] = { college: s.college, department: s.department }; });
        const facMap = {};
        facSnap.forEach(f => { facMap[f.uid||f.id] = { college: f.college, department: f.department }; });

        const applyCollege = (parts, map, uidKey) => collegeFilter
          ? parts.filter(p => map[p[uidKey]]?.college === collegeFilter)
          : parts;

        const filteredStud = applyCollege(studParts, studMap, 'studentUid');
        const filteredFac  = applyCollege(facParts,  facMap,  'facultyUid');

        const deptTotals = {};
        depts.forEach(d => deptTotals[d] = { enrolled: 0, completed: 0 });

        if (activeRole === 'all' || activeRole === 'students') {
           filteredStud.forEach(p => {
             const dept = studMap[p.studentUid]?.department || p.department;
             if (deptTotals[dept]) {
               deptTotals[dept].enrolled++;
               if (p.status === 'Completed') deptTotals[dept].completed++;
             }
           });
        }

        if (activeRole === 'all' || activeRole === 'faculty') {
           filteredFac.forEach(p => {
             const dept = facMap[p.facultyUid]?.department || p.department;
             if (deptTotals[dept]) {
               deptTotals[dept].enrolled++;
               if (p.status === 'Completed') deptTotals[dept].completed++;
             }
           });
        }

        let summaryRows = depts.map(dept => {
          const stats = deptTotals[dept];
          return {
            dept,
            enrolled: stats.enrolled,
            completed: stats.completed,
            pct: stats.enrolled > 0 ? Math.round((stats.completed / stats.enrolled) * 100) : 0,
            certificates: stats.completed 
          };
        }).filter(r => r.enrolled > 0);

        summaryRows.sort((a,b) => b.enrolled - a.enrolled);

        if (summaryRows.length === 0) {
          document.getElementById('departmentSummaryBody').innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 24px; color: var(--text3);">No department participation data available yet.</td></tr>';
          return;
        }

        document.getElementById('departmentSummaryBody').innerHTML = summaryRows.map(r => `
          <tr>
            <td style="font-weight: 600; color: #f8fafc; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px;">${r.dept.toUpperCase()}</td>
            <td style="font-weight: 500; color: #e2e8f0; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px;">${r.enrolled}</td>
            <td style="font-weight: 500; color: #e2e8f0; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px;">${r.completed}</td>
            <td style="font-weight: 600; color: ${r.pct >= 75 ? '#10b981' : '#fef08a'}; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px;">${r.pct}%</td>
            <td style="font-weight: 500; color: #e2e8f0; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px;">${r.certificates}</td>
            <td style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px;">
              <span style="font-size:11px; padding:4px 10px; border-radius:99px; font-weight:500; border:1px solid #065f46; background:rgba(6,95,70,0.5); color:#34d399;">On Track</span>
            </td>
          </tr>
        `).join('');

      } catch (e) { console.error('Chart error:', e.message); }
    }
    async function loadChartData() {
      try {
        const collegeFilter = activeCollege !== 'all' ? COLLEGE_MAP[activeCollege] : null;
        const depts = ['CSE','IT','AML','ADS','ECE','EEE','EIE','Mech','Bio','Chem'];

        const [studParts, facParts, studSnap, facSnap] = await Promise.all([
          apiCall('GET', '/admin/all-participation'),
          apiCall('GET', '/admin/faculty-participation'),
          apiCall('GET', '/admin/students'),
          apiCall('GET', '/admin/faculty/all'),
        ]);

        const studMap = {};
        studSnap.forEach(s => { studMap[s.uid||s.id] = { college: s.college, department: s.department }; });
        const facMap  = {};
        facSnap.forEach(f => { facMap[f.uid||f.id]  = { college: f.college, department: f.department }; });

        const applyCollege = (parts, map, key) => collegeFilter
          ? parts.filter(p => map[p[key]]?.college === collegeFilter) : parts;

        const filteredStud = applyCollege(studParts, studMap, 'studentUid');
        const filteredFac  = applyCollege(facParts,  facMap,  'facultyUid');

        const deptStats = (parts, map, key) => depts.map(dept => {
          const dp = parts.filter(p => (map[p[key]]?.department || p.department) === dept);
          return { enrolled: dp.length, completed: dp.filter(p => p.status === 'Completed').length };
        });

        const datasets = [];

        if (activeRole === 'students' || activeRole === 'all') {
          if (activeCollege === 'all') {
            const eng  = filteredStud.filter(p => studMap[p.studentUid]?.college === COLLEGE_MAP.engineering);
            const tech = filteredStud.filter(p => studMap[p.studentUid]?.college === COLLEGE_MAP.technology);
            const es = deptStats(eng,  studMap, 'studentUid');
            const ts = deptStats(tech, studMap, 'studentUid');
            datasets.push({ label: '👤 Students – Engineering', data: es.map(s=>s.completed), backgroundColor: '#3b28cc', borderRadius: 5, barPercentage: 0.4, categoryPercentage: 0.6, _enrolled: es.map(s=>s.enrolled) });
            datasets.push({ label: '👤 Students – Technology',  data: ts.map(s=>s.completed), backgroundColor: '#8b5cf6', borderRadius: 5, barPercentage: 0.4, categoryPercentage: 0.6, _enrolled: ts.map(s=>s.enrolled) });
          } else {
            const ss = deptStats(filteredStud, studMap, 'studentUid');
            datasets.push({ label: `👤 Students – ${activeCollege==='engineering'?'Engineering':'Technology'}`, data: ss.map(s=>s.completed), backgroundColor: '#3b28cc', borderRadius: 5, barPercentage: 0.4, categoryPercentage: 0.6, _enrolled: ss.map(s=>s.enrolled) });
          }
        }

        if (activeRole === 'faculty' || activeRole === 'all') {
          if (activeCollege === 'all') {
            const eng  = filteredFac.filter(p => facMap[p.facultyUid]?.college === COLLEGE_MAP.engineering);
            const tech = filteredFac.filter(p => facMap[p.facultyUid]?.college === COLLEGE_MAP.technology);
            const ef = deptStats(eng,  facMap, 'facultyUid');
            const tf = deptStats(tech, facMap, 'facultyUid');
            datasets.push({ label: '🎓 Faculty – Engineering', data: ef.map(s=>s.completed), backgroundColor: '#10b981', borderRadius: 5, barPercentage: 0.4, categoryPercentage: 0.6, _enrolled: ef.map(s=>s.enrolled) });
            datasets.push({ label: '🎓 Faculty – Technology',  data: tf.map(s=>s.completed), backgroundColor: '#06b6d4', borderRadius: 5, barPercentage: 0.4, categoryPercentage: 0.6, _enrolled: tf.map(s=>s.enrolled) });
          } else {
            const fs = deptStats(filteredFac, facMap, 'facultyUid');
            datasets.push({ label: `🎓 Faculty – ${activeCollege==='engineering'?'Engineering':'Technology'}`, data: fs.map(s=>s.completed), backgroundColor: '#10b981', borderRadius: 5, barPercentage: 0.4, categoryPercentage: 0.6, _enrolled: fs.map(s=>s.enrolled) });
          }
        }

        // Only show depts with data
        const activeIdx   = depts.map((_, i) => i).filter(i => datasets.some(ds => ds.data[i] > 0 || ds._enrolled[i] > 0));
        const activeDepts = activeIdx.length ? activeIdx.map(i => depts[i]) : depts;

        chartInstance.data.labels   = activeDepts;
        chartInstance.data.datasets = datasets.map(ds => ({
          ...ds,
          data:      activeIdx.length ? activeIdx.map(i => ds.data[i])      : ds.data,
          _enrolled: activeIdx.length ? activeIdx.map(i => ds._enrolled[i]) : ds._enrolled,
        }));
        chartInstance.update();
      } catch (e) { console.error('Chart error:', e.message); }
    }

    async function loadCompletionRates() {
      try {
        const collegeFilter = activeCollege !== 'all' ? COLLEGE_MAP[activeCollege] : null;
        const [studParts, facParts, studSnap, facSnap] = await Promise.all([
          apiCall('GET', '/admin/all-participation'),
          apiCall('GET', '/admin/faculty-participation'),
          apiCall('GET', '/admin/students'),
          apiCall('GET', '/admin/faculty/all'),
        ]);

        const studMap = {};
        studSnap.forEach(s => { studMap[s.uid||s.id] = { college: s.college }; });
        const facMap = {};
        facSnap.forEach(f => { facMap[f.uid||f.id] = { college: f.college }; });

        const programStats = {};

        if (activeRole === 'students') {
           studParts.forEach(p => {
             const col = studMap[p.studentUid]?.college;
             if (collegeFilter && col !== collegeFilter) return;
             
             const prog = p.programName || p.program || 'Unknown Program';
             if (!programStats[prog]) programStats[prog] = { enrolled: 0, completed: 0 };
             programStats[prog].enrolled++;
             if (p.status === 'Completed') programStats[prog].completed++;
           });
        }

        if (activeRole === 'faculty') {
           facParts.forEach(p => {
             const col = facMap[p.facultyUid]?.college;
             if (collegeFilter && col !== collegeFilter) return;
             
             const prog = p.programName || p.program || 'Unknown Program';
             if (!programStats[prog]) programStats[prog] = { enrolled: 0, completed: 0 };
             programStats[prog].enrolled++;
             if (p.status === 'Completed') programStats[prog].completed++;
           });
        }

        let rates = Object.keys(programStats).map(prog => {
          const stats = programStats[prog];
          const pct = stats.enrolled > 0 ? Math.round((stats.completed / stats.enrolled) * 100) : 0;
          return { label: prog, pct, enrolled: stats.enrolled };
        }).filter(r => r.enrolled > 0);

        // Sort by completion percentage descending
        rates.sort((a,b) => b.pct - a.pct);

        if (rates.length === 0) {
          document.getElementById('completionRates').innerHTML = '<div style="color:var(--text3); font-size:14px; text-align:center;">No program participation data available yet.</div>';
          return;
        }

        document.getElementById('completionRates').innerHTML = rates.map(r => `
          <div>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px; font-weight:500; color:var(--text1);">
              <span>${r.label}</span>
              <span style="color:#a855f7;">${r.pct}%</span>
            </div>
            <div style="background:rgba(168,85,247,0.15); border-radius:99px; height:3px; overflow:hidden;">
              <div class="progress-bar-animate" style="width:0%; background:linear-gradient(90deg,#a855f7,#7c3aed); height:100%; border-radius:99px;"></div>
            </div>
          </div>`).join('');

        // Animate all bars after render
        requestAnimationFrame(() => {
          document.querySelectorAll('.progress-bar-animate').forEach((bar, i) => {
            setTimeout(() => { bar.style.transition = 'width 1.2s cubic-bezier(0.4,0,0.2,1)'; bar.style.width = rates[i].pct + '%'; }, i * 150);
          });
        });
      } catch (e) { console.error('Completion rate error:', e.message); }
    }
  </script>
</body>
</html>
