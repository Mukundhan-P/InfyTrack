<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – CompanyConnect</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" style="text-decoration:none;"><div class="brand-hex">⬡</div><div><div class="brand-name">CompanyConnect</div><div class="brand-sub">Admin Panel</div></div></a>
    <div class="nav-links"><span id="navAdmin" style="color:rgba(255,255,255,0.7);font-size:13px;"></span><a href="admin-login.html" onclick="doLogout('admin-login.html')" class="btn-nav">Logout</a></div>
  </nav>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Admin Menu</div><div id="sidebarLinks"></div></div></aside>
    <main class="main-content">
      <div class="page-header anim"><div class="breadcrumb">Admin / <span>Dashboard</span></div><h1>Analytics Dashboard</h1><p>Real-time overview of student participation and document verification.</p></div>

      <div class="stats-row anim anim-1" id="statsRow"><p class="text-muted">Loading...</p></div>

      <div class="grid-2 anim anim-2" style="margin-bottom:20px;">
        <div class="card">
          <div class="card-header"><div class="card-title">Document Status</div><div class="card-tag">PROOF STATUS</div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;" id="certMetrics"></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Quick Links</div></div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <a href="admin-pending.html" class="btn btn-primary btn-full">⏳ Review Pending Registrations</a>
            <a href="admin-verify.html" class="btn btn-outline btn-full">✅ Verify Documents</a>
            <a href="admin-students.html" class="btn btn-outline btn-full">👥 View All Students</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="shared.js"></script>
  <script>
    const admin = requireAdmin();
    if (admin) {
      document.getElementById('navAdmin').textContent = admin.name;
      document.getElementById('sidebarLinks').innerHTML = buildAdminNav('admin-dashboard.html');
      loadStats();
    }

    async function loadStats() {
      try {
        const stats = await apiCall('GET', '/admin/dashboard');
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">Total Students</div><div class="stat-value">${stats.totalStudents}</div><div class="stat-delta">Approved</div></div>
          <div class="stat-card"><div class="stat-icon">📘</div><div class="stat-label">Enrolled</div><div class="stat-value">${stats.enrolled}</div><div class="stat-delta">Across all programs</div></div>
          <div class="stat-card"><div class="stat-icon">🏅</div><div class="stat-label">Completed</div><div class="stat-value">${stats.completed}</div><div class="stat-delta">Programs finished</div></div>
          <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">Verified Docs</div><div class="stat-value">${stats.verifiedDocs}</div><div class="stat-delta">Admin verified</div></div>`;

        document.getElementById('certMetrics').innerHTML = [
          ['✅', 'Verified', stats.verifiedDocs, 'var(--success)'],
          ['🔍', 'Pending Review', stats.pendingDocs, 'var(--warning)'],
          ['❌', 'Rejected', stats.rejectedDocs, 'var(--danger)'],
        ].map(([icon, label, val, color]) => `
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;">
            <div style="font-size:28px;margin-bottom:6px;">${icon}</div>
            <div style="font-family:var(--font-head);font-size:28px;font-weight:800;color:${color};">${val}</div>
            <div class="text-muted" style="margin-top:4px;">${label}</div>
          </div>`).join('');
      } catch (err) {
        document.getElementById('statsRow').innerHTML = `<p class="text-muted">${err.message}</p>`;
      }
    }
  </script>
</body>
</html>
