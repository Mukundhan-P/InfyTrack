<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports – Admin – InfyTrack</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" style="text-decoration:none;"><img src="bee2.jpeg" alt="StudentsConnect Logo" style="width: 36px; height: 36px; border-radius: 8px; object-fit: cover; margin-right: 8px;"><div><div class="brand-name">InfyTrack</div><div class="brand-sub">Academic Activity Dashboard</div></div></a>
    <div class="nav-links"><span id="navAdmin" style="color:rgba(255,255,255,0.7);font-size:13px;"></span><a href="admin-login.html" onclick="doLogout('admin-login.html')" class="btn-nav">Logout</a></div>
  </nav>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Admin Menu</div><div id="sidebarLinks"></div></div></aside>
    <main class="main-content">
      <div class="page-header anim"><div class="breadcrumb">Admin / <span>Reports</span></div><h1>Generate Reports</h1><p>Export participation and document reports as Excel or PDF.</p></div>

      <div class="card anim anim-1 mb-4">
        <div class="card-header"><div class="card-title">Report Filters</div><div class="card-tag">EXPORT</div></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
          <div class="form-group" style="margin:0;">
            <label class="form-label">Report Type</label>
            <select id="rType" class="form-control">
              <option value="">Participation Report</option>
              <option value="documents">Documents Report</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Department</label>
            <select id="fDept" class="form-control">
              <option value="">All</option>
              <option>CSE</option><option>IT</option><option>AML</option><option>ADS</option>
              <option>ECE</option><option>EEE</option><option>EIE</option><option>Mech</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Batch</label>
            <select id="fBatch" class="form-control">
              <option value="">All</option>
              <option>2022-26</option><option>2023-27</option><option>2024-28</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Program</label>
            <select id="fProg" class="form-control"><option value="">All Programs</option></select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Status</label>
            <select id="fStatus" class="form-control">
              <option value="">All</option>
              <option>Doing</option><option>Completed</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:16px;">
          <button class="btn btn-primary btn-lg" onclick="loadPreview()">🔍 Preview</button>
          <button class="btn btn-outline btn-lg" onclick="doExcelExport()">📊 Export Excel</button>
          <button class="btn btn-outline btn-lg" onclick="doPDFExport()">📄 Export PDF</button>
        </div>
      </div>

      <div class="card anim anim-2">
        <div class="card-header"><div class="card-title">Preview (<span id="rowCount">0</span> rows)</div></div>
        <div class="table-wrap" id="previewWrap"><p class="text-muted">Click Preview to load data.</p></div>
      </div>
    </main>
  </div>
  <script src="shared.js"></script>
  <script>
    const admin = requireAdmin();
    let currentData = [];

    if (admin) {
      document.getElementById('navAdmin').textContent = admin.name;
      document.getElementById('sidebarLinks').innerHTML = buildAdminNav('admin-reports.html');
      loadProgramOptions();
    }

    async function loadProgramOptions() {
      try {
        const programs = await apiCall('GET', '/programs');
        const sel = document.getElementById('fProg');
        programs.forEach(p => sel.innerHTML += `<option value="${p.name}">${p.name}</option>`);
      } catch (e) {}
    }

    function buildQuery() {
      const params = new URLSearchParams();
      const type = document.getElementById('rType').value;
      const dept = document.getElementById('fDept').value;
      const batch = document.getElementById('fBatch').value;
      const prog = document.getElementById('fProg').value;
      const status = document.getElementById('fStatus').value;
      if (type) params.set('type', type);
      if (dept) params.set('dept', dept);
      if (batch) params.set('year', batch);
      if (prog) params.set('program', prog);
      if (status) params.set('status', status);
      return params.toString();
    }

    async function loadPreview() {
      try {
        currentData = await apiCall('GET', `/admin/report?${buildQuery()}`);
        document.getElementById('rowCount').textContent = currentData.length;
        if (!currentData.length) { document.getElementById('previewWrap').innerHTML = '<p class="text-muted">No data found.</p>'; return; }
        const keys = Object.keys(currentData[0]);
        document.getElementById('previewWrap').innerHTML = `
          <table class="data-table">
            <thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead>
            <tbody>${currentData.slice(0, 15).map(row => `<tr>${keys.map(k => `<td style="font-size:12px;">${row[k] ?? '—'}</td>`).join('')}</tr>`).join('')}</tbody>
          </table>
          ${currentData.length > 15 ? `<p class="text-muted" style="margin-top:10px;font-size:11px;">Showing 15 of ${currentData.length} rows. Export for full data.</p>` : ''}`;
      } catch (e) {
        document.getElementById('previewWrap').innerHTML = `<p class="text-muted">${e.message}</p>`;
      }
    }

    async function doExcelExport() {
      if (!currentData.length) await loadPreview();
      exportToExcel(currentData, document.getElementById('rType').value === 'documents' ? 'Documents_Report' : 'Participation_Report');
    }

    async function doPDFExport() {
      if (!currentData.length) await loadPreview();
      if (!currentData.length) return alert('No data to export.');
      const keys = Object.keys(currentData[0]);
      const title = document.getElementById('rType').value === 'documents' ? 'Documents Report' : 'Participation Report';
      const win = window.open('', '_blank');
      win.document.write(`<html><head><title>${title}</title>
        <style>body{font-family:Arial;padding:20px;}h1{color:#3b28cc;}table{width:100%;border-collapse:collapse;margin-top:20px;}th{background:#3b28cc;color:#fff;padding:8px 10px;text-align:left;font-size:11px;}td{padding:7px 10px;border-bottom:1px solid #e2e6f0;font-size:11px;}tr:hover{background:#f7f8fc;}.footer{margin-top:30px;font-size:10px;color:#94a3b8;}</style>
        </head><body>
        <h1>InfyTrack – ${title}</h1>
        <p style="color:#64748b;font-size:12px;">Generated: ${new Date().toLocaleString('en-IN')}</p>
        <table><thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead>
        <tbody>${currentData.map(row => `<tr>${keys.map(k => `<td>${row[k] ?? '—'}</td>`).join('')}</tr>`).join('')}</tbody></table>
        <div class="footer">Total: ${currentData.length} records | InfyTrack</div>
        </body></html>`);
      win.document.close();
      setTimeout(() => win.print(), 500);
    }
  </script>
</body>
</html>
