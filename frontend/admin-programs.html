<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Programs – Admin – CompanyConnect</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" style="text-decoration:none;"><img src="bee2.jpeg" alt="StudentsConnect Logo" style="width: 36px; height: 36px; border-radius: 8px; object-fit: cover; margin-right: 8px;"><div><div class="brand-name">CompanyConnect</div><div class="brand-sub">Admin Panel</div></div></a>
    <div class="nav-links"><span id="navAdmin" style="color:rgba(255,255,255,0.7);font-size:13px;"></span><a href="admin-login.html" onclick="doLogout('admin-login.html')" class="btn-nav">Logout</a></div>
  </nav>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Admin Menu</div><div id="sidebarLinks"></div></div></aside>
    <main class="main-content">
      <div class="page-header anim"><div class="breadcrumb">Admin / <span>Programs</span></div><h1>Program Management</h1><p>Add and manage Infosys Springboard programs.</p></div>
      <div id="alertBox"></div>
      <!-- Add Program Form -->
      <div class="card anim anim-1">
        <div class="card-header"><div class="card-title">Add New Program</div><div class="card-tag">ADMIN</div></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Program Name <span class="req">*</span></label><input id="pName" class="form-control" placeholder="e.g. Infosys Cloud Workshop"/></div>
          <div class="form-group"><label class="form-label">Type <span class="req">*</span></label>
            <select id="pType" class="form-control"><option>Training</option><option>Internship</option><option>Certification</option><option>Workshop</option></select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="pDesc" class="form-control" rows="3" placeholder="Brief description..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Start Date</label><input type="date" id="pStart" class="form-control"/></div>
          <div class="form-group"><label class="form-label">End Date</label><input type="date" id="pEnd" class="form-control"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Duration</label><input id="pDuration" class="form-control" placeholder="4 Weeks"/></div>
          <div class="form-group"><label class="form-label">Eligibility</label><input id="pEligibility" class="form-control" placeholder="All Students"/></div>
        </div>
        <div class="form-group"><label class="form-label">Assign To</label>
          <select id="pAssignTo" class="form-control">
            <option value="all">All (Students & Faculty)</option>
            <option value="students">Students Only</option>
            <option value="faculty">Faculty Only</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Program Link</label><input id="pLink" class="form-control" placeholder="https://springboard.infosys.com/..."/><small style="color:var(--text3);font-size:11px;">Direct link to the program registration page</small></div>
        <button class="btn btn-primary btn-lg" id="addBtn" onclick="addProgram()">➕ Add Program</button>
      </div>

      <!-- Current Programs List -->
      <div class="card anim anim-2" style="margin-top:24px;">
        <div class="card-header"><div class="card-title">Current Programs</div><span id="progCount" class="text-mono"></span></div>
        <div id="programsList"><p class="text-muted">Loading...</p></div>
      </div>
    </main>
  </div>
  <script src="shared.js"></script>
  <script>
    const admin = requireAdmin();
    if (admin) {
      document.getElementById('navAdmin').textContent = admin.name;
      document.getElementById('sidebarLinks').innerHTML = buildAdminNav('admin-programs.html');
      loadPrograms();
    }

    async function loadPrograms() {
      try {
        const programs = await apiCall('GET', '/programs/all');
        const el = document.getElementById('programsList');
        document.getElementById('progCount').textContent = programs.length + ' program(s)';
        if (!programs.length) { el.innerHTML = '<p class="text-muted">No programs yet.</p>'; return; }
        el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;">${programs.map(p => `
          <div style="padding:16px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div style="flex:1;">
                <div style="font-weight:700;font-size:14px;margin-bottom:8px;">${p.name}</div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">${typeBadge(p.type)}<span class="text-mono">${p.duration || '—'}</span><span class="badge badge-submitted">${p.assignTo === 'faculty' ? '🎓 Faculty' : p.assignTo === 'students' ? '👤 Students' : '👥 All'}</span></div>
                <div class="text-mono">${formatDate(p.start)} → ${formatDate(p.end)}</div>
                ${p.desc ? `<div style="margin-top:6px;font-size:12px;color:var(--text2);">${p.desc}</div>` : ''}
                ${p.link ? `<div style="margin-top:6px;"><a href="${p.link}" target="_blank" style="font-size:12px;color:var(--primary);">🔗 Program Link</a></div>` : ''}
              </div>
              <button class="btn btn-danger btn-sm" style="margin-left:12px;" onclick="deleteProgram('${p.id}')">Delete</button>
            </div>
          </div>`).join('')}</div>`;
      } catch (e) { document.getElementById('programsList').innerHTML = `<p class="text-muted">${e.message}</p>`; }
    }

    async function addProgram() {
      const name = document.getElementById('pName').value.trim();
      if (!name) return showAlert('alertBox', 'Program name is required.', 'error');
      const btn = document.getElementById('addBtn');
      btn.disabled = true; btn.textContent = 'Adding...';
      try {
        await apiCall('POST', '/programs', {
          name, type: document.getElementById('pType').value,
          desc: document.getElementById('pDesc').value,
          start: document.getElementById('pStart').value,
          end: document.getElementById('pEnd').value,
          duration: document.getElementById('pDuration').value || '—',
          eligibility: document.getElementById('pEligibility').value || 'All Students',
          assignTo: document.getElementById('pAssignTo').value,
          link: document.getElementById('pLink').value.trim(),
        });
        showAlert('alertBox', 'Program added successfully!', 'success');
        ['pName', 'pDesc', 'pStart', 'pEnd', 'pDuration', 'pEligibility', 'pLink'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('pAssignTo').value = 'all';
        loadPrograms();
      } catch (e) {
        showAlert('alertBox', e.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = '➕ Add Program';
      }
    }

    async function deleteProgram(id) {
      if (!confirm('Delete this program?')) return;
      try {
        await apiCall('DELETE', `/programs/${id}`);
        showAlert('alertBox', 'Program deleted.', 'info');
        loadPrograms();
      } catch (e) { showAlert('alertBox', e.message, 'error'); }
    }
  </script>
</body>
</html>
