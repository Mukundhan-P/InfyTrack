<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Programs – Faculty – InfyTrack</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .prog-cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
    .pc { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow); }
    .pc-top { padding: 20px 24px 16px; }
    .pc-bottom { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; gap: 10px; flex-wrap: wrap; }
    .pc-bottom .btn { flex: 1; min-width: 120px; justify-content: center; }
    .pc-name { font-family: var(--font-head); font-size: 17px; font-weight: 700; margin: 10px 0 6px; }
    .pc-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .pc-meta { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .pc-meta-item { font-size: 11px; font-family: var(--font-mono); color: var(--text3); }
    .pc-meta-item strong { color: var(--text2); }
    .filter-btn { padding: 8px 20px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    @media (max-width: 768px) {
      .prog-cards { grid-template-columns: 1fr; gap: 14px; }
      .pc-top { padding: 16px; }
      .pc-bottom { padding: 12px 16px 16px; flex-direction: column; }
      .pc-bottom .btn { width: 100%; min-width: unset; }
      .pc-name { font-size: 15px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" style="text-decoration:none;"><img src="bee2.jpeg" alt="StudentsConnect Logo" style="width: 36px; height: 36px; border-radius: 8px; object-fit: cover; margin-right: 8px;"><div><div class="brand-name">InfyTrack</div><div class="brand-sub">Academic Activity Dashboard</div></div></a>
    <div class="nav-links"><span id="navUser" style="color:rgba(255,255,255,0.7);font-size:13px;"></span><a href="login.html" onclick="Auth.logout()" class="btn-nav">Logout</a></div>
  </nav>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Faculty Menu</div><div id="sidebarLinks"></div></div></aside>
    <main class="main-content">
      <div class="page-header anim"><div class="breadcrumb">Faculty / <span>Programs</span></div><h1>Available Programs</h1><p>Browse and enroll in Infosys Springboard programs.</p></div>
      <div class="anim anim-1" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
        <button class="filter-btn active" onclick="filterPrograms('All')">All</button>
        <button class="filter-btn" onclick="filterPrograms('Certification')">Certification</button>
        <button class="filter-btn" onclick="filterPrograms('Training')">Training</button>
        <button class="filter-btn" onclick="filterPrograms('Workshop')">Workshop</button>
        <button class="filter-btn" onclick="filterPrograms('Internship')">Internship</button>
      </div>
      <div class="prog-cards anim anim-2" id="progCards"><p class="text-muted">Loading...</p></div>
    </main>
  </div>
  <script src="shared.js"></script>
  <script>
    const faculty = requireFaculty();
    if (faculty) {
      document.getElementById('navUser').textContent = faculty.name;
      document.getElementById('sidebarLinks').innerHTML = buildFacultyNav('faculty-programs.html');
      loadPrograms();
    }
    let allPrograms = [];
    async function loadPrograms() {
      try { allPrograms = await apiCall('GET', '/programs/faculty'); renderPrograms(allPrograms); }
      catch (e) { document.getElementById('progCards').innerHTML = `<p class="text-muted">${e.message}</p>`; }
    }
    function filterPrograms(type) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === type));
      renderPrograms(type === 'All' ? allPrograms : allPrograms.filter(p => p.type === type));
    }
    function renderPrograms(programs) {
      const el = document.getElementById('progCards');
      if (!programs.length) { el.innerHTML = '<p class="text-muted">No programs found.</p>'; return; }
      const typeColors = { Training:'#ede9fe|#5b21b6', Internship:'#dbeafe|#1d4ed8', Certification:'#d1fae5|#047857', Workshop:'#fef3c7|#92400e' };
      el.innerHTML = programs.map(p => {
        const [bg, color] = (typeColors[p.type]||'#f1f5f9|#475569').split('|');
        return `<div class="pc">
          <div class="pc-top">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="badge" style="background:${bg};color:${color};">${p.type}</span>
              <span class="text-mono">${p.duration||'—'}</span>
            </div>
            <div class="pc-name">${p.name}</div>
            <div class="pc-desc">${p.desc||''}</div>
            <div class="pc-meta">
              <div class="pc-meta-item"><strong>Start:</strong> ${formatDate(p.start)}</div>
              <div class="pc-meta-item"><strong>End:</strong> ${formatDate(p.end)}</div>
              <div class="pc-meta-item"><strong>Eligibility:</strong> ${p.eligibility||'All'}</div>
            </div>
          </div>
          <div class="pc-bottom">
            <a href="faculty-participation.html?prog=${p.id}" class="btn btn-primary">Enroll Now</a>
          </div>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
